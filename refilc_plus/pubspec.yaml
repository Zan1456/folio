name: refilc_plus
publish_to: "none"

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  # Folio Main
  refilc:
    path: ../refilc/
  # e-KRETA API (kreten) client
  refilc_kreta_api:
    path: ../refilc_kreta_api/
  # Folio Mobile UI
  refilc_mobile_ui:
    path: "../refilc_mobile_ui/"

  provider: ^6.1.1
  uni_links: ^0.5.1
  url_launcher: ^6.2.5
  dropdown_button2: ^3.0.0
  home_widget: ^0.9.0
  image_picker: ^1.0.7
  animations: ^2.0.11
  flutter_svg: ^2.0.10+1
  flutter_dynamic_icon: ^2.1.0
  i18n_extension: ^15.1.0
  http: ^1.2.0
  fl_chart: ^1.2.0
  flutter_dynamic_icon_plus: ^1.1.2
  share_plus: ^12.0.1
  path_provider: ^2.1.3
  file_picker: ^10.3.10

dependency_overrides:
  webview_flutter_wkwebview: 3.17.0
  intl: 0.20.2

dev_dependencies:
  flutter_lints: ^5.0.0

flutter:
