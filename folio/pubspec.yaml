name: folio
description: "Egy nem hivatalos e-KRÉTA kliens, diákoktól diákoknak."
homepage: https://folio.zan1456.dev
publish_to: "none"

version: 1.0.8+40

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  folio_mobile_ui:
    path: "../folio_mobile_ui/"
  folio_kreta_api:
    path: "../folio_kreta_api/"
  flutter_localizations:
    sdk: flutter
  i18n_extension: ^15.1.0
  sqflite: ^2.3.3
  intl: ^0.20.2
  provider: ^6.1.2
  http: ^1.3.0
  uuid: ^4.5.1
  html: ^0.15.5
  open_filex: ^4.6.0
  path_provider: ^2.1.5
  permission_handler: ^12.0.0
  share_plus: ^12.0.1
  connectivity_plus: ^7.0.0
  flutter_displaymode: ^0.7.0
  quick_actions: ^1.1.0
  animated_list_plus: ^0.5.2
  dynamic_color: 1.8.1
  material_color_utilities: ^0.13.0
  crypto: ^3.0.6
  elegant_notification: ^2.4.1
  animated_flip_counter: ^0.3.4
  animated_background: ^2.0.0
  dropdown_button2: ^3.0.0
  flutter_expandable_fab: ^2.3.0
  url_launcher: ^6.3.1
  flutter_svg: ^2.0.17
  image_picker: ^1.1.2
  animations: ^2.0.11
  background_fetch: ^1.3.7
  firebase_core: ^3.13.1
  firebase_messaging: ^15.2.5
  package_info_plus: ^9.0.0
  screenshot: ^3.0.0
  image_crop_plus: ^1.0.0
  maps_launcher: ^3.0.0+1
  google_fonts: ^8.0.2
  get_it: ^9.2.1
  xml: ^6.5.0
  flutter_native_splash: ^2.4.4

dependency_overrides:
  intl: 0.20.2

dev_dependencies:
  flutter_launcher_icons: ^0.14.3
  sqflite_common_ffi: ^2.3.4+4

flutter:
  uses-material-design: true

  assets:
    - assets/icons/ic_splash.png
    - assets/icons/ic_rounded.png
    - assets/images/
    - assets/svg/menu_icons/
    - assets/other/dirtywords.xml
    - assets/svg/
    - assets/svg/cover_arts/


flutter_launcher_icons:
  image_path: assets/icons/colored_logo.webp
  android: true
  adaptive_icon_background: assets/icons/colored_logo_without_mustache.png
  adaptive_icon_foreground: assets/icons/colored_logo_only_mustache.png
  adaptive_icon_monochrome: assets/icons/monochrome_logo.png
  ios: false
  remove_alpha_ios: false
  web:
    generate: false
  compress: true

flutter_native_splash:
  color: "#7CA021"
  image: assets/icons/splash_android12.png
  android_12:
    image: assets/icons/splash_android12.png
  android: true
  android_gravity: center
  ios: true
  ios_content_mode: center
  web: false
